name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: netanalyzer.exe
            archive: netanalyzer-windows-x86_64.zip

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: netanalyzer
            archive: netanalyzer-linux-x86_64.tar.gz

          - os: macos-latest
            target: x86_64-apple-darwin
            binary: netanalyzer
            archive: netanalyzer-macos-x86_64.tar.gz

          # ─── Future Architectures ─────────────────────
          # Uncomment to add ARM64 support:
          #
          # - os: ubuntu-latest
          #   target: aarch64-unknown-linux-gnu
          #   binary: netanalyzer
          #   archive: netanalyzer-linux-arm64.tar.gz
          #
          # - os: macos-latest
          #   target: aarch64-apple-darwin
          #   binary: netanalyzer
          #   archive: netanalyzer-macos-arm64.tar.gz
          #
          # - os: windows-latest
          #   target: aarch64-pc-windows-msvc
          #   binary: netanalyzer.exe
          #   archive: netanalyzer-windows-arm64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            pkg-config

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.archive }} ${{ matrix.binary }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive }} ${{ matrix.binary }}

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
