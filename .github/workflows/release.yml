name: Build and Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: netanalyzer.exe
            archive: netanalyzer-windows-x86_64-portable.zip
            installer: netanalyzer-windows-x86_64-installer.msi

          - os: windows-latest
            target: aarch64-pc-windows-msvc
            binary: netanalyzer.exe
            archive: netanalyzer-windows-arm64-portable.zip
            installer: netanalyzer-windows-arm64-installer.msi

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: netanalyzer
            archive: netanalyzer-linux-x86_64-portable.tar.gz
            installer: netanalyzer-linux-x86_64-installer.deb

          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: netanalyzer
            archive: netanalyzer-linux-arm64-portable.tar.gz
            installer: netanalyzer-linux-arm64-installer.deb

          - os: macos-13
            target: x86_64-apple-darwin
            binary: netanalyzer
            archive: netanalyzer-macos-x86_64-portable.tar.gz
            installer: netanalyzer-macos-x86_64-installer.dmg

          - os: macos-latest
            target: aarch64-apple-darwin
            binary: netanalyzer
            archive: netanalyzer-macos-arm64-portable.tar.gz
            installer: netanalyzer-macos-arm64-installer.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            pkg-config

      - name: Build Portable Executable
        run: cargo build --release --target ${{ matrix.target }}

      # ─── Portable Packages ──────────────────────────────────────────────────
      - name: Package Portable (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.archive }} ${{ matrix.binary }}

      - name: Package Portable (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive }} ${{ matrix.binary }}

      # ─── Native Installers ──────────────────────────────────────────────────
      - name: Build Windows Installer (.msi)
        if: runner.os == 'Windows'
        run: |
          cargo install cargo-wix
          cargo wix --nocapture
          Copy-Item target/wix/*.msi ../${{ matrix.installer }}
        working-directory: .

      - name: Build Linux Installer (.deb)
        if: runner.os == 'Linux'
        run: |
          cargo install cargo-deb
          cargo deb
          cp target/debian/*.deb ${{ matrix.installer }}

      - name: Build macOS Installer (.dmg)
        if: runner.os == 'macOS'
        run: |
          cargo install cargo-bundle
          cargo bundle --release --format osx
          hdiutil create -volname "NetAnalyzer" -srcfolder target/release/bundle/osx/netanalyzer.app -ov -format UDZO ${{ matrix.installer }}

      # ─── Upload Artifacts ───────────────────────────────────────────────────
      - name: Upload Portable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.installer }}
          path: ${{ matrix.installer }}

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.archive }}
            ${{ matrix.installer }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
